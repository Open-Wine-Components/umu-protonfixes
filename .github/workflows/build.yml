name: make

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  steamrt3:
    runs-on: ubuntu-latest
    container: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:beta
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build umu-protonfixes
        run: |
          make install
      - name: List dist files
        run: |
          find dist/

  steamrt4:
    runs-on: ubuntu-latest
    container: registry.gitlab.steamos.cloud/proton/steamrt4/sdk/x86_64:4.0.20260331.220802-0
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build umu-protonfixes
        run: |
          make install
      - name: List dist files
        run: |
          find dist/

  steamrt4-arm64:
    runs-on: ubuntu-24.04-arm
    container: registry.gitlab.steamos.cloud/proton/steamrt4/sdk/arm64-llvm:4.0.20260331.220802-0
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build umu-protonfixes
        env:
          TARGET_ARCH: arm64
        run: |
           make install
      - name: List dist files
        run: |
          find dist/

  umu:
    runs-on: ubuntu-latest
    container: ghcr.io/open-wine-components/umu-sdk:latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build umu-protonfixes
        run: |
          make install
      - name: List dist files
        run: |
          find dist/
